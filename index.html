<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        .toggle-buttons { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .toggle-buttons button { width: 48%; padding: 10px; cursor: pointer; border: none; background-color: #e4e6eb; border-radius: 4px; }
        .toggle-buttons button.active { background-color: #007bff; color: white; }
        form { display: none; flex-direction: column; }
        form.active { display: flex; }
        input { margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button[type="submit"] { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="toggle-buttons">
        <button id="btn-login" class="active" onclick="mostrarFormulario('login')">Iniciar Sesión</button>
        <button id="btn-register" onclick="mostrarFormulario('register')">Registrarse</button>
    </div>

<form id="form-login" class="active" action="/login" method="POST">
        <h3>Iniciar Sesión</h3>
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Ingresar</button>
    </form>

   <form id="form-register" action="/registrar" method="POST">
        <h3>Registro de Usuario</h3>
        <input type="text" name="nombre" placeholder="Nombre completo" required>
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Registrarme</button>
    </form>
</div>

<script>
    // Función JavaScript para alternar la vista entre ambos formularios
    function mostrarFormulario(tipo) {
        document.getElementById('form-login').classList.remove('active');
        document.getElementById('form-register').classList.remove('active');
        document.getElementById('btn-login').classList.remove('active');
        document.getElementById('btn-register').classList.remove('active');

        if (tipo === 'login') {
            document.getElementById('form-login').classList.add('active');
            document.getElementById('btn-login').classList.add('active');
        } else {
            document.getElementById('form-register').classList.add('active');
            document.getElementById('btn-register').classList.add('active');
        }
    }
</script>

</body>
</html>
